name: Build PDF and Publish Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: make build

      - name: Generate PDF
        run: make pdf

      - name: Compute release tag
        id: vars
        run: |
          short_sha="${GITHUB_SHA:0:7}"
          safe_ref="${GITHUB_REF_NAME//\//-}"
          echo "tag=pdf-${safe_ref}-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "name=PDF ${GITHUB_REF_NAME} @ ${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Publish release with PDF
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: output/libro-actividades.pdf